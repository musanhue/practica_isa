<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Juego de Inglés para Ti 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

        /* Estilos generales para asegurar que ocupe toda la pantalla */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evitar el scroll en la vista principal */
        }

        body {
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: #5D4037;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 600px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5em;
            color: #D81B60;
            text-shadow: 2px 2px #fce4ec;
        }

        h2 {
            font-size: 1.8em;
            color: #F4511E;
            margin-bottom: 20px;
        }
        
        #scrambled-word {
            font-size: 2em;
            letter-spacing: 5px;
            background-color: #ffcdd2;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            margin: 10px 0;
            user-select: none;
        }
        
        #info-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            background-color: #fff9c4;
            border-radius: 15px;
            padding: 5px 15px;
            margin-bottom: 20px;
        }
        
        #score-marker {
            color: #0288D1;
        }
        
        #progress {
            color: #757575;
        }

        #answer-input {
            width: 80%;
            padding: 15px;
            font-size: 1.5em;
            border-radius: 15px;
            border: 3px solid #FBC02D;
            margin-top: 15px;
            text-align: center;
        }

        .button {
            padding: 15px 30px;
            font-size: 1.5em;
            font-family: 'Comic Neue', cursive;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
            font-weight: bold;
        }
        
        .button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #speak-btn {
            background-color: #8E24AA;
            font-size: 2.5em;
            padding: 10px 20px;
        }

        #check-btn {
            background-color: #43A047;
        }

        #next-btn {
            background-color: #1E88E5;
            display: none; /* Oculto al principio */
        }
        
        #feedback {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            min-height: 50px;
        }
        
        #feedback small {
            font-size: 0.8em;
            color: #5D4037;
            display: block;
            margin-top: 10px;
        }

        #completion-message {
            display: none; /* Oculto al principio */
        }

        /* ✨ Estilos para Móviles y Tablets ✨ */
        @media (max-width: 600px) {
            body {
                padding: 0;
            }
            h1 {
                font-size: 2em;
            }
            h2 {
                font-size: 1.5em;
            }
            
            #game-container {
                padding: 15px;
                width: 100%;
                height: 100%;
                border-radius: 0;
                box-shadow: none;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            #answer-input {
                width: 95%;
                font-size: 1.2em;
                padding: 12px;
            }

            .button {
                font-size: 1.2em;
                padding: 15px 20px; /* Aumentamos el padding vertical para que sea más fácil de tocar */
                width: 80%;
                display: block;
                margin: 10px auto;
            }
            
            #speak-btn {
                font-size: 2em;
                width: auto; /* Dejar que se ajuste al contenido */
                display: inline-block;
                padding: 15px 25px;
            }
            
            #info-bar {
                flex-direction: column;
                font-size: 1em;
                padding: 10px;
                gap: 5px;
            }
            
            #feedback {
                font-size: 1.2em;
                min-height: 40px;
            }

            #scrambled-word {
                font-size: 1.5em;
                word-break: break-all; /* Para que no se salga de la pantalla si es largo */
            }
        }

    </style>
</head>
<body>

    <div id="game-container">
        <h1>¡Hola, súper estrella! 🌟</h1>
        
        <div id="info-bar">
            <p id="score-marker">Puntaje: 0 ⭐</p>
            <p id="progress">Juego 1 / 10</p>
        </div>
        
        <div id="game-area">
            <h2 id="game-title">Juego 1: Escucha y Escribe 🎧</h2>
            <p id="game-instruction">Haz clic en el parlante 🔊 para escuchar la palabra y luego escríbela en inglés.</p>
            
            <div id="scrambled-word-container" style="display:none;">
                <p>Ordena las letras:</p>
                <p id="scrambled-word"></p>
            </div>
            
            <div>
                <button id="speak-btn" class="button">🔊</button>
            </div>
            
            <input type="text" id="answer-input" placeholder="Escribe aquí..." autocomplete="off">
            
            <div id="feedback"></div>
            
            <div>
                <button id="check-btn" class="button">¡Revisar! ✅</button>
                <button id="next-btn" class="button">Siguiente ➡️</button>
            </div>
        </div>

        <div id="completion-message">
            <h2>¡LO LOGRASTE! 🎉🥳</h2>
            <p>¡Eres increíble! Has completado todos los juegos.</p>
            <p>Tu puntaje final es: <span id="final-score"></span> ⭐</p>
            <button class="button" onclick="location.reload()" style="background-color:#D81B60;">Jugar de Nuevo 💖</button>
        </div>
    </div>

    <script>
        const words = [
            { en: 'living room', es: 'el salón donde vemos tele 🛋️' },
            { en: 'dining room', es: 'el lugar donde comemos en familia 🍽️' },
            { en: 'kitchen', es: 'donde se prepara la comida deliciosa 🍳' },
            { en: 'bathroom', es: 'donde nos bañamos y lavamos los dientes 🛁' },
            { en: 'cellar', es: 'el sótano, a veces un poco oscuro 📦' },
            { en: 'bedroom', es: 'tu cuarto para dormir y soñar 🛏️' },
            { en: 'hall', es: 'el pasillo que conecta las habitaciones 🚶‍♀️' },
            { en: 'stairs', es: 'las escaleras para subir y bajar 📶' }
        ];

        let shuffledWords = [];
        let currentWordIndex = 0;
        let currentGameCount = 1;
        let score = 0;
        const totalGames = 10;

        // Elementos del DOM
        const gameTitleEl = document.getElementById('game-title');
        const gameInstructionEl = document.getElementById('game-instruction');
        const speakBtn = document.getElementById('speak-btn');
        const answerInput = document.getElementById('answer-input');
        const checkBtn = document.getElementById('check-btn');
        const nextBtn = document.getElementById('next-btn');
        const feedbackEl = document.getElementById('feedback');
        const progressEl = document.getElementById('progress');
        const gameArea = document.getElementById('game-area');
        const completionMessage = document.getElementById('completion-message');
        const scrambledContainer = document.getElementById('scrambled-word-container');
        const scrambledWordEl = document.getElementById('scrambled-word');
        const scoreEl = document.getElementById('score-marker');
        const finalScoreEl = document.getElementById('final-score');

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function scrambleWord(word) {
            let scrambled = shuffle(word.replace(/\s/g, '').split('')).join('');
            return (scrambled === word.replace(/\s/g, '')) ? scrambleWord(word) : scrambled;
        }

        function speakWord(word) {
            // Cancelar cualquier voz anterior para evitar que se superpongan
            speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }

        function setupGame() {
            if (currentGameCount > totalGames) {
                gameArea.style.display = 'none';
                finalScoreEl.textContent = score;
                completionMessage.style.display = 'block';
                return;
            }

            if (currentWordIndex >= shuffledWords.length) {
                currentWordIndex = 0;
                shuffledWords = shuffle([...words]);
            }
            
            const currentWord = shuffledWords[currentWordIndex];
            const gameType = Math.floor(Math.random() * 3);

            // Reset UI
            answerInput.value = '';
            answerInput.disabled = false;
            feedbackEl.innerHTML = '';
            checkBtn.style.display = 'inline-block';
            nextBtn.style.display = 'none';
            speakBtn.style.display = 'inline-block';
            scrambledContainer.style.display = 'none';
            progressEl.textContent = `Juego ${currentGameCount} / ${totalGames}`;
            scoreEl.innerHTML = `Puntaje: ${score} ⭐`;

            // Configurar tipo de juego
            switch(gameType) {
                case 0: // Listen and Type
                    gameTitleEl.textContent = `Juego ${currentGameCount}: Escucha y Escribe 🎧`;
                    gameInstructionEl.textContent = `Haz clic en el parlante 🔊 para escuchar la palabra y luego escríbela.`;
                    break;
                case 1: // Read definition and Type
                    gameTitleEl.textContent = `Juego ${currentGameCount}: Adivina la Palabra 🤔`;
                    gameInstructionEl.textContent = `¿Qué parte de la casa es "${currentWord.es}"? ¡Escríbelo en inglés!`;
                    break;
                case 2: // Unscramble the word
                    gameTitleEl.textContent = `Juego ${currentGameCount}: Ordena las Letras 🧩`;
                    gameInstructionEl.textContent = `¡Ordena las letras para formar la palabra correcta! Escúchala si necesitas una pista.`;
                    scrambledWordEl.textContent = scrambleWord(currentWord.en);
                    scrambledContainer.style.display = 'block';
                    break;
            }
        }

        function checkAnswer() {
            const userAnswer = answerInput.value.trim().toLowerCase();
            const currentWord = shuffledWords[currentWordIndex];
            const correctAnswer = currentWord.en;

            if (userAnswer === correctAnswer) {
                score += 10;
                feedbackEl.innerHTML = `¡CORRECTO! ¡GENIAL! 🎉🤩<br><small>"${correctAnswer}" significa: ${currentWord.es}</small>`;
                feedbackEl.style.color = '#4CAF50';
                answerInput.disabled = true;
                checkBtn.style.display = 'none';
                nextBtn.style.display = 'inline-block';
            } else {
                score = Math.max(0, score - 5); // Resta puntos, pero nunca baja de 0
                feedbackEl.innerHTML = '¡Casi! Inténtalo de nuevo. ¡Tú puedes! 💪';
                feedbackEl.style.color = '#F44336';
                answerInput.select();
            }
            scoreEl.innerHTML = `Puntaje: ${score} ⭐`; // Actualiza el puntaje en la pantalla
        }

        speakBtn.addEventListener('click', () => {
            speakWord(shuffledWords[currentWordIndex].en);
        });

        checkBtn.addEventListener('click', checkAnswer);
        
        answerInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter' && !answerInput.disabled) {
                checkAnswer();
            }
        });

        nextBtn.addEventListener('click', () => {
            currentGameCount++;
            currentWordIndex++;
            setupGame();
        });

        // Configuración inicial
        shuffledWords = shuffle([...words]);
        setupGame();

    </script>

</body>
</html>
