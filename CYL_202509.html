<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos para practicar Inglés</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff;
            /* Prevent scrolling on touch devices during drag */
            overscroll-behavior-y: contain;
        }
        h1, h2, h3 {
            font-family: 'Fredoka One', cursive;
        }
        .game-card {
            background-color: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
            display: none; /* Ocultar todos los juegos al principio */
        }
        .active-game {
            display: block; /* Mostrar solo el juego activo */
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            -webkit-tap-highlight-color: transparent; /* Remove tap highlight on mobile */
        }
        .btn-primary {
            background-color: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background-color: #f472b6;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #ec4899;
            transform: translateY(-2px);
        }
        .btn-correct {
            background-color: #22c55e;
            color: white;
        }
        .btn-incorrect {
            background-color: #ef4444;
            color: white;
        }
        .option-btn {
            border: 2px solid #e5e7eb;
            width: 100%;
            text-align: center;
        }
        .option-btn:hover {
             border-color: #f472b6;
             color: #ec4899;
        }
        .draggable {
            cursor: grab;
            user-select: none;
            padding: 0.5rem 1rem;
            margin: 0.25rem;
            background-color: #e0f2fe;
            border-radius: 10px;
            border: 2px dashed #7dd3fc;
            touch-action: none; /* Necessary for touch drag */
        }
        .dragging-touch {
            opacity: 0.8;
            transform: scale(1.05);
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            min-height: 50px;
            transition: background-color 0.3s;
        }
        .drop-zone.hovered {
            background-color: #dbeafe;
        }
        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 1rem 2rem;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }
        .message.show {
            opacity: 1;
        }
        .message.success {
            background-color: #22c55e;
        }
        .message.error {
            background-color: #ef4444;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="message-box" class="message"></div>

    <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl md:text-5xl text-blue-500">English Adventure Games</h1>
        <div class="bg-pink-400 text-white p-4 rounded-full shadow-lg">
            <h2 class="text-2xl md:text-3xl">Score: <span id="total-score">0</span></h2>
        </div>
    </header>

    <main id="game-container">

        <!-- Menú de selección de juegos -->
        <div id="game-menu" class="game-card active-game">
            <h2 class="text-3xl text-center text-pink-500 mb-6">Choose a game<span class="block text-xl text-gray-500 font-normal">Elige un juego</span></h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <!-- Se generarán los botones del menú con JS -->
            </div>
        </div>
        
        <!-- Aquí se insertarán los juegos -->

    </main>

    <footer class="text-center mt-8">
        <button id="back-to-menu" class="btn btn-primary" style="display: none;">Volver al menú</button>
    </footer>

    <script>
        const gameContainer = document.getElementById('game-container');
        const gameMenu = document.getElementById('game-menu');
        const totalScoreEl = document.getElementById('total-score');
        const backToMenuBtn = document.getElementById('back-to-menu');
        const messageBox = document.getElementById('message-box');

        let totalScore = 0;
        let activeGame = null;

        const games = [
            // Game 1: Unscramble Days
            {
                title: 'Ordena las letras',
                points: 10,
                data: [
                    { word: 'Monday', scrambled: 'd M y a n o' },
                    { word: 'Tuesday', scrambled: 'y T d s e u a' },
                    { word: 'Wednesday', scrambled: 'W d e d y n e s a' },
                    { word: 'Thursday', scrambled: 'y d T u h a s r' },
                    { word: 'Friday', scrambled: 'd F y a i r' },
                    { word: 'Saturday', scrambled: 'S d a y a t u r' },
                    { word: 'Sunday', scrambled: 'd S n y a u' }
                ],
                setup: function() {
                    let currentWordIndex = 0;

                    const showQuestion = () => {
                        if (currentWordIndex >= this.data.length) {
                            endGame("You completed the word scramble game!");
                            return;
                        }
                        const current = this.data[currentWordIndex];
                        this.content.innerHTML = `
                            <h3 class="text-2xl text-center mb-4">What day of the week is it?<span class="block text-lg text-gray-500 font-normal">¿Qué día de la semana es?</span></h3>
                            <p class="text-4xl text-center font-bold text-blue-500 tracking-widest mb-6">${current.scrambled}</p>
                            <input id="answer-input" type="text" class="w-full p-3 border-2 border-gray-300 rounded-lg text-xl text-center" placeholder="Write here...">
                            <button id="submit-btn" class="btn btn-secondary w-full mt-4">Check</button>
                        `;
                        
                        document.getElementById('submit-btn').onclick = () => {
                            const input = document.getElementById('answer-input');
                            const userAnswer = input.value.trim().toLowerCase();
                            const correctAnswer = current.word.toLowerCase();
                            if (userAnswer === correctAnswer) {
                                showMessage('Correct!', 'success');
                                updateScore(this.points);
                                currentWordIndex++;
                                setTimeout(showQuestion, 1000);
                            } else {
                                showMessage(`Try again. The answer was ${current.word}.`, 'error');
                                input.value = '';
                            }
                        };
                         document.getElementById('answer-input').addEventListener('keypress', function (e) {
                            if (e.key === 'Enter') {
                                document.getElementById('submit-btn').click();
                            }
                        });
                    };
                    showQuestion();
                }
            },
            // Game 2: Order Days
            {
                title: 'Ordena la semana',
                points: 10,
                data: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
                setup: function() {
                    let shuffledDays = [...this.data].sort(() => Math.random() - 0.5);
                    this.content.innerHTML = `
                        <h3 class="text-2xl text-center mb-4">Drag the days in the correct order.<span class="block text-lg text-gray-500 font-normal">Arrastra los días en el orden correcto.</span></h3>
                        <div id="ordered-days" class="drop-zone p-4 rounded-lg bg-gray-100 mb-4 flex flex-wrap justify-center items-center"></div>
                        <div id="day-options" class="p-4 flex flex-wrap justify-center items-center">
                            ${shuffledDays.map(day => `<div class="draggable" draggable="true">${day}</div>`).join('')}
                        </div>
                        <button id="check-order-btn" class="btn btn-secondary w-full mt-4">Check Order</button>
                    `;

                    const draggables = this.content.querySelectorAll('.draggable');
                    const dropZones = this.content.querySelectorAll('.drop-zone, #day-options');
                    
                    // Mouse Drag Events
                    draggables.forEach(draggable => {
                        draggable.addEventListener('dragstart', () => draggable.classList.add('opacity-50'));
                        draggable.addEventListener('dragend', () => draggable.classList.remove('opacity-50'));
                    });
                    
                    dropZones.forEach(zone => {
                        zone.addEventListener('dragover', e => {
                            e.preventDefault();
                            zone.classList.add('hovered');
                        });
                        zone.addEventListener('dragleave', () => zone.classList.remove('hovered'));
                        zone.addEventListener('drop', e => {
                            e.preventDefault();
                            const draggedEl = document.querySelector('.opacity-50');
                            if(draggedEl) zone.appendChild(draggedEl);
                            zone.classList.remove('hovered');
                        });
                    });

                    // Touch Drag Events
                    addTouchDrag(draggables, dropZones);

                    document.getElementById('check-order-btn').onclick = () => {
                        const orderedElements = Array.from(this.content.querySelector('#ordered-days').children);
                        const userOrder = orderedElements.map(el => el.textContent);
                        
                        if (JSON.stringify(userOrder) === JSON.stringify(this.data)) {
                             showMessage('Excellent! The order is perfect!', 'success');
                             updateScore(this.points * this.data.length);
                             endGame("Game complete!");
                        } else {
                            showMessage('The order is not correct. Try again!', 'error');
                        }
                    };
                }
            },
            // Game 3: Match Verb to Activity
            {
                title: 'Une Verbo y Actividad',
                points: 10,
                data: {
                    'go': 'swimming',
                    'ride': 'a bike',
                    'watch': 'TV',
                    'play': 'football'
                },
                setup: function() {
                    const verbs = Object.keys(this.data);
                    const activities = Object.values(this.data).sort(() => Math.random() - 0.5);
                    this.content.innerHTML = `
                        <h3 class="text-2xl text-center mb-4">Match the verb with the correct activity.<span class="block text-lg text-gray-500 font-normal">Une el verbo con la actividad correcta.</span></h3>
                        <div class="grid grid-cols-2 gap-8">
                            <div id="verbs-col" class="flex flex-col gap-4 items-center">
                                ${verbs.map(verb => `<button class="btn btn-primary w-3/4 verb-option" data-verb="${verb}">${verb}</button>`).join('')}
                            </div>
                            <div id="activities-col" class="flex flex-col gap-4 items-center">
                                ${activities.map(activity => `<button class="btn btn-secondary w-3/4 activity-option" data-activity="${activity}">${activity}</button>`).join('')}
                            </div>
                        </div>
                    `;
                    
                    let selectedVerb = null;
                    let correctPairs = 0;

                    this.content.querySelectorAll('.verb-option').forEach(btn => {
                        btn.onclick = () => {
                            selectedVerb = btn.dataset.verb;
                            this.content.querySelectorAll('.verb-option').forEach(b => b.classList.remove('ring-4', 'ring-yellow-400'));
                            btn.classList.add('ring-4', 'ring-yellow-400');
                        }
                    });

                    this.content.querySelectorAll('.activity-option').forEach(btn => {
                        btn.onclick = () => {
                            if (!selectedVerb) {
                                showMessage('Choose a verb first.', 'error');
                                return;
                            }
                            const selectedActivity = btn.dataset.activity;
                            if (this.data[selectedVerb] === selectedActivity) {
                                showMessage('Great job!', 'success');
                                updateScore(this.points);
                                correctPairs++;
                                this.content.querySelector(`[data-verb="${selectedVerb}"]`).disabled = true;
                                this.content.querySelector(`[data-verb="${selectedVerb}"]`).classList.add('opacity-50');
                                btn.disabled = true;
                                btn.classList.add('opacity-50');
                                selectedVerb = null;
                                this.content.querySelectorAll('.verb-option').forEach(b => b.classList.remove('ring-4', 'ring-yellow-400'));
                                if (correctPairs === verbs.length) {
                                    endGame("You completed all the matches!");
                                }
                            } else {
                                showMessage('That is not the correct pair.', 'error');
                            }
                        }
                    });
                }
            },
            // Game 4: Image & Activity Match
            {
                title: '¿Qué actividad es?',
                points: 15,
                data: [
                    { img: '⚽', text: 'play football', options: ['go swimming', 'play football', 'ride a horse'] },
                    { img: '🏊', text: 'go swimming', options: ['watch TV', 'ride a bike', 'go swimming'] },
                    { img: '🚲', text: 'ride a bike', options: ['ride a bike', 'play piano', 'go climbing'] },
                    { img: '📺', text: 'watch TV', options: ['go running', 'watch TV', 'play computer games'] },
                    { img: '🐴', text: 'ride a horse', options: ['go fishing', 'ride a horse', 'play with toys'] },
                ],
                setup: function() {
                    let currentIndex = 0;
                    const showQuestion = () => {
                         if (currentIndex >= this.data.length) {
                            endGame("Image game completed!");
                            return;
                        }
                        const current = this.data[currentIndex];
                        const shuffledOptions = [...current.options].sort(() => Math.random() - 0.5);
                        this.content.innerHTML = `
                            <h3 class="text-2xl text-center mb-4">Look at the image and choose the correct option.<span class="block text-lg text-gray-500 font-normal">Mira la imagen y elige la opción correcta.</span></h3>
                            <div class="text-8xl text-center mb-6">${current.img}</div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                ${shuffledOptions.map(opt => `<button class="btn option-btn p-4 text-xl" data-option="${opt}">${opt}</button>`).join('')}
                            </div>
                        `;
                        this.content.querySelectorAll('.option-btn').forEach(btn => {
                            btn.onclick = (e) => {
                                const userAnswer = e.target.dataset.option;
                                if (userAnswer === current.text) {
                                    e.target.classList.add('btn-correct');
                                    showMessage('Correct!', 'success');
                                    updateScore(this.points);
                                    currentIndex++;
                                    setTimeout(showQuestion, 1000);
                                } else {
                                    e.target.classList.add('btn-incorrect');
                                    showMessage('Incorrect. Try again.', 'error');
                                }
                            };
                        });
                    };
                    showQuestion();
                }
            },
            // Game 5: Fill in the Verb
            {
                title: 'Completa la oración',
                points: 15,
                data: [
                    { sentence: ['I', '____', 'football on Mondays.'], verb: 'play', options: ['go', 'ride', 'play', 'watch'] },
                    { sentence: ['I', '____', 'my bike on Tuesdays.'], verb: 'ride', options: ['watch', 'ride', 'play', 'go'] },
                    { sentence: ['I', '____', 'TV on Sundays.'], verb: 'watch', options: ['go', 'watch', 'ride', 'play'] },
                    { sentence: ['I', '____', 'swimming on Fridays.'], verb: 'go', options: ['play', 'ride', 'watch', 'go'] },
                ],
                setup: function() {
                    let currentIndex = 0;
                    const showQuestion = () => {
                         if (currentIndex >= this.data.length) {
                            endGame("Sentence completion game finished!");
                            return;
                        }
                        const current = this.data[currentIndex];
                        this.content.innerHTML = `
                            <h3 class="text-2xl text-center mb-4">Choose the correct verb.<span class="block text-lg text-gray-500 font-normal">Elige el verbo correcto.</span></h3>
                            <p class="text-3xl text-center bg-yellow-100 p-4 rounded-lg mb-6">
                                ${current.sentence.join(' ')}
                            </p>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                ${current.options.map(opt => `<button class="btn btn-secondary p-4 text-xl" data-option="${opt}">${opt}</button>`).join('')}
                            </div>
                        `;
                        this.content.querySelectorAll('.btn-secondary').forEach(btn => {
                            btn.onclick = (e) => {
                                const userAnswer = e.target.dataset.option;
                                if (userAnswer === current.verb) {
                                    e.target.classList.add('btn-correct');
                                    showMessage('Great!', 'success');
                                    updateScore(this.points);
                                    currentIndex++;
                                    setTimeout(showQuestion, 1000);
                                } else {
                                    e.target.classList.add('btn-incorrect');
                                    showMessage('Oops, that is not it.', 'error');
                                }
                            }
                        });
                    };
                    showQuestion();
                }
            },
            // Game 6: Yes/No Game
            {
                title: 'Sí o No',
                points: 15,
                data: [
                    { img: '🎹', question: 'Do you play the piano?', answer: true },
                    { img: '🎣', question: 'Do you watch TV?', answer: false },
                    { img: '💻', question: 'Do you play computer games?', answer: true },
                    { img: '🏊', question: 'Do you ride a horse?', answer: false },
                ],
                setup: function() {
                    let currentIndex = 0;
                    const showQuestion = () => {
                        if (currentIndex >= this.data.length) {
                            endGame("Yes/No game completed!");
                            return;
                        }
                        const current = this.data[currentIndex];
                        this.content.innerHTML = `
                            <h3 class="text-2xl text-center mb-4">Answer the question.<span class="block text-lg text-gray-500 font-normal">Responde la pregunta.</span></h3>
                            <div class="text-8xl text-center mb-6">${current.img}</div>
                            <p class="text-3xl text-center text-blue-600 mb-6">${current.question}</p>
                            <div class="flex justify-center gap-4">
                               <button class="btn btn-correct p-4 text-xl w-1/3" data-answer="true">Yes, I do.</button>
                               <button class="btn btn-incorrect p-4 text-xl w-1/3" data-answer="false">No, I don't.</button>
                            </div>
                        `;
                        this.content.querySelectorAll('button[data-answer]').forEach(btn => {
                            btn.onclick = (e) => {
                                const userAnswer = e.target.dataset.answer === 'true';
                                if (userAnswer === current.answer) {
                                    showMessage('Correct answer!', 'success');
                                    updateScore(this.points);
                                    currentIndex++;
                                    setTimeout(showQuestion, 1000);
                                } else {
                                    showMessage('That is not the answer.', 'error');
                                }
                            };
                        });
                    };
                    showQuestion();
                }
            },
            // Game 7: Sentence Builder
             {
                title: 'Crea la oración',
                points: 20,
                data: [
                    ['I', 'play', 'football', 'on', 'Mondays.'],
                    ['I', 'ride', 'my', 'bike', 'on', 'Tuesdays.'],
                    ['I', 'go', 'swimming', 'on', 'Fridays.'],
                    ['I', 'watch', 'TV', 'on', 'Sundays.']
                ],
                setup: function() {
                    let currentIndex = 0;
                    const showQuestion = () => {
                         if (currentIndex >= this.data.length) {
                            endGame("You are an expert sentence builder!");
                            return;
                        }
                        const currentWords = this.data[currentIndex];
                        const shuffledWords = [...currentWords].sort(() => Math.random() - 0.5);
                        
                        this.content.innerHTML = `
                            <h3 class="text-2xl text-center mb-4">Order the words to form a sentence.<span class="block text-lg text-gray-500 font-normal">Ordena las palabras para formar una oración.</span></h3>
                            <div id="sentence-zone" class="drop-zone p-4 rounded-lg bg-blue-100 mb-4 flex flex-wrap justify-center items-center"></div>
                            <div id="word-options" class="p-4 flex flex-wrap justify-center items-center">
                                ${shuffledWords.map(word => `<div class="draggable bg-pink-100 border-pink-300" draggable="true">${word}</div>`).join('')}
                            </div>
                            <button id="check-sentence-btn" class="btn btn-secondary w-full mt-4">Check Sentence</button>
                        `;

                        const draggables = this.content.querySelectorAll('.draggable');
                        const dropZones = this.content.querySelectorAll('.drop-zone, #word-options');
                        
                        // Mouse Events
                        draggables.forEach(draggable => {
                            draggable.addEventListener('dragstart', () => draggable.classList.add('opacity-50'));
                            draggable.addEventListener('dragend', () => draggable.classList.remove('opacity-50'));
                        });
                        dropZones.forEach(zone => {
                            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('hovered'); });
                            zone.addEventListener('dragleave', () => zone.classList.remove('hovered'));
                            zone.addEventListener('drop', e => {
                                e.preventDefault();
                                zone.classList.remove('hovered');
                                const draggedEl = document.querySelector('.opacity-50');
                                if (draggedEl) zone.appendChild(draggedEl);
                            });
                        });
                        
                        // Touch Events
                        addTouchDrag(draggables, dropZones);

                        document.getElementById('check-sentence-btn').onclick = () => {
                            const userWords = Array.from(this.content.querySelector('#sentence-zone').children).map(el => el.textContent);
                            const correctSentence = currentWords.join(' ');
                            const userSentence = userWords.join(' ');
                            
                            if (userSentence === correctSentence) {
                                showMessage('Perfect sentence!', 'success');
                                updateScore(this.points);
                                currentIndex++;
                                setTimeout(showQuestion, 1000);
                            } else {
                                showMessage('Not correct. Check the order!', 'error');
                            }
                        };
                    };
                    showQuestion();
                }
            },
             // Game 8: Memory Game
            {
                title: 'Juego de Memoria',
                points: 15,
                data: [
                    { id: 1, type: 'img', content: '⚽' }, { id: 1, type: 'text', content: 'football' },
                    { id: 2, type: 'img', content: '🏊' }, { id: 2, type: 'text', content: 'swimming' },
                    { id: 3, type: 'img', content: '🚲' }, { id: 3, type: 'text', content: 'bike' },
                    { id: 4, type: 'img', content: '📺' }, { id: 4, type: 'text', content: 'TV' },
                    { id: 5, type: 'img', content: '🐴' }, { id: 5, type: 'text', content: 'horse' },
                    { id: 6, type: 'img', content: '🎹' }, { id: 6, type: 'text', content: 'piano' }
                ],
                setup: function() {
                    let shuffledCards = [...this.data].sort(() => Math.random() - 0.5);
                    let flippedCards = [];
                    let matchedPairs = 0;

                    this.content.innerHTML = `
                        <h3 class="text-2xl text-center mb-4">Find the pairs (image and word).<span class="block text-lg text-gray-500 font-normal">Encuentra las parejas (imagen y palabra).</span></h3>
                        <div id="memory-board" class="grid grid-cols-4 gap-4">
                            ${shuffledCards.map((card, index) => `
                                <div class="memory-card bg-blue-400 rounded-lg aspect-square flex justify-center items-center cursor-pointer" data-id="${card.id}" data-index="${index}">
                                    <div class="card-content hidden text-2xl md:text-4xl">${card.content}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;

                    const cards = this.content.querySelectorAll('.memory-card');
                    cards.forEach(card => {
                        card.addEventListener('click', () => {
                            if (flippedCards.length < 2 && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
                                card.classList.add('flipped', 'bg-white');
                                card.querySelector('.card-content').classList.remove('hidden');
                                flippedCards.push(card);

                                if (flippedCards.length === 2) {
                                    const card1 = flippedCards[0];
                                    const card2 = flippedCards[1];
                                    if (card1.dataset.id === card2.dataset.id) {
                                        showMessage('Pair found!', 'success');
                                        updateScore(this.points);
                                        card1.classList.add('matched');
                                        card2.classList.add('matched');
                                        matchedPairs++;
                                        flippedCards = [];
                                        if (matchedPairs === this.data.length / 2) {
                                            endGame("You won the memory game!");
                                        }
                                    } else {
                                        showMessage('Not a pair.', 'error');
                                        setTimeout(() => {
                                            card1.classList.remove('flipped', 'bg-white');
                                            card1.querySelector('.card-content').classList.add('hidden');
                                            card2.classList.remove('flipped', 'bg-white');
                                            card2.querySelector('.card-content').classList.add('hidden');
                                            flippedCards = [];
                                        }, 1200);
                                    }
                                }
                            }
                        });
                    });
                }
            },
            // Game 9: What day is it?
            {
                title: '¿Qué día es?',
                points: 15,
                data: [
                    { activity: 'play football', day: 'Monday' },
                    { activity: 'ride a bike', day: 'Wednesday' },
                    { activity: 'watch TV', day: 'Friday' },
                    { activity: 'go swimming', day: 'Saturday' },
                ],
                days: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
                setup: function() {
                    let currentIndex = 0;

                    const showQuestion = () => {
                        if (currentIndex >= this.data.length) {
                            endGame("You know what to do every day!");
                            return;
                        }
                        const current = this.data[currentIndex];
                        this.content.innerHTML = `
                            <h3 class="text-2xl text-center mb-4">If I say...<span class="block text-lg text-gray-500 font-normal">Si yo digo...</span></h3>
                            <p class="text-3xl text-center bg-green-100 p-4 rounded-lg mb-6">"I ${current.activity} on..."</p>
                            <h3 class="text-2xl text-center mb-4">What day is it?<span class="block text-lg text-gray-500 font-normal">¿Qué día es?</span></h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                ${this.days.map(day => `<button class="btn option-btn p-4 text-xl" data-day="${day}">${day}</button>`).join('')}
                            </div>
                        `;

                        this.content.querySelectorAll('.option-btn').forEach(btn => {
                            btn.onclick = (e) => {
                                const userAnswer = e.target.dataset.day;
                                if (userAnswer === current.day) {
                                    e.target.classList.add('btn-correct');
                                    showMessage('Exactly!', 'success');
                                    updateScore(this.points);
                                    currentIndex++;
                                    setTimeout(showQuestion, 1000);
                                } else {
                                    e.target.classList.add('btn-incorrect');
                                    showMessage('That is not the day, try again.', 'error');
                                }
                            };
                        });
                    };
                    showQuestion();
                }
            },
            // Game 10: Complete the -ING word
            {
                title: 'Completa con -ING',
                points: 20,
                data: [
                    { sentence: 'I go swimm', answer: 'swimming', img: '🏊' },
                    { sentence: 'He is runn', answer: 'running', img: '🏃' },
                    { sentence: 'She likes climb', answer: 'climbing', img: '🧗' },
                    { sentence: 'We go fish', answer: 'fishing', img: '🎣' },
                ],
                setup: function() {
                    let currentIndex = 0;

                    const showQuestion = () => {
                        if (currentIndex >= this.data.length) {
                            endGame("You master the -ING words!");
                            return;
                        }
                        const current = this.data[currentIndex];
                        this.content.innerHTML = `
                            <h3 class="text-2xl text-center mb-4">Complete the word with ING.<span class="block text-lg text-gray-500 font-normal">Completa la palabra con ING.</span></h3>
                            <div class="text-8xl text-center mb-6">${current.img}</div>
                            <div class="flex justify-center items-baseline">
                                <p class="text-3xl">${current.sentence}</p>
                                <input id="ing-input" type="text" value="ing" class="w-24 p-1 border-b-2 border-gray-400 rounded-none text-3xl focus:outline-none focus:border-pink-500">
                            </div>
                            <button id="check-ing-btn" class="btn btn-secondary w-full mt-6">Check</button>
                        `;

                        const input = document.getElementById('ing-input');
                        document.getElementById('check-ing-btn').onclick = () => {
                            const userAnswer = current.sentence.replace(/\s/g, '') + input.value.trim().toLowerCase();
                            if (userAnswer === current.answer) {
                                showMessage('Perfect!', 'success');
                                updateScore(this.points);
                                currentIndex++;
                                setTimeout(showQuestion, 1000);
                            } else {
                                showMessage(`Almost... the word is ${current.answer}`, 'error');
                            }
                        };
                         input.addEventListener('keypress', function (e) {
                            if (e.key === 'Enter') {
                                document.getElementById('check-ing-btn').click();
                            }
                        });
                    };
                    showQuestion();
                }
            },
        ];

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message ${type} show`;
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 2000);
        }

        function updateScore(points) {
            totalScore += points;
            totalScoreEl.textContent = totalScore;
        }

        function startGame(gameIndex) {
            gameMenu.classList.remove('active-game');
            if (activeGame) activeGame.remove();
            
            const gameData = games[gameIndex];
            const gameDiv = document.createElement('div');
            gameDiv.id = 'current-game';
            gameDiv.className = 'game-card active-game';
            gameDiv.innerHTML = `<h2 class="text-3xl text-center text-pink-500 mb-6">${gameIndex + 1}. ${gameData.title}</h2><div id="game-content"></div>`;
            gameContainer.appendChild(gameDiv);
            
            activeGame = gameDiv;
            gameData.content = gameDiv.querySelector('#game-content');
            gameData.setup();

            backToMenuBtn.style.display = 'inline-block';
        }
        
        function endGame(message) {
            showMessage(message, 'success');
            setTimeout(showMenu, 2000);
        }

        function showMenu() {
            if (activeGame) {
                activeGame.remove();
                activeGame = null;
            }
            gameMenu.classList.add('active-game');
            backToMenuBtn.style.display = 'none';
        }

        function createMenu() {
            const menuGrid = gameMenu.querySelector('.grid');
            games.forEach((game, index) => {
                const button = document.createElement('button');
                button.className = 'btn btn-primary p-4 h-24 text-center flex flex-col justify-center items-center';
                button.innerHTML = `<span>${index + 1}. ${game.title}</span> <span class="text-xs opacity-80">${game.points} Points</span>`;
                button.onclick = () => startGame(index);
                menuGrid.appendChild(button);
            });
        }
        
        function addTouchDrag(draggables, dropZones) {
            let draggedItem = null;
            let offsetX, offsetY;
            
            draggables.forEach(item => {
                item.addEventListener('touchstart', e => {
                    draggedItem = e.target;
                    const rect = draggedItem.getBoundingClientRect();
                    offsetX = e.touches[0].clientX - rect.left;
                    offsetY = e.touches[0].clientY - rect.top;

                    draggedItem.classList.add('dragging-touch');
                    draggedItem.style.position = 'fixed';
                    draggedItem.style.left = `${e.touches[0].clientX - offsetX}px`;
                    draggedItem.style.top = `${e.touches[0].clientY - offsetY}px`;
                    draggedItem.style.zIndex = '1000';
                }, { passive: false });
            });

            document.addEventListener('touchmove', e => {
                if (!draggedItem) return;
                e.preventDefault();
                
                const touchX = e.touches[0].clientX;
                const touchY = e.touches[0].clientY;

                draggedItem.style.left = `${touchX - offsetX}px`;
                draggedItem.style.top = `${touchY - offsetY}px`;

                dropZones.forEach(zone => {
                    const rect = zone.getBoundingClientRect();
                    if (touchX > rect.left && touchX < rect.right && touchY > rect.top && touchY < rect.bottom) {
                        zone.classList.add('hovered');
                    } else {
                        zone.classList.remove('hovered');
                    }
                });
            }, { passive: false });

            document.addEventListener('touchend', e => {
                if (!draggedItem) return;
                
                const touchX = e.changedTouches[0].clientX;
                const touchY = e.changedTouches[0].clientY;

                let droppedInZone = false;
                dropZones.forEach(zone => {
                    zone.classList.remove('hovered');
                    const rect = zone.getBoundingClientRect();
                     if (touchX > rect.left && touchX < rect.right && touchY > rect.top && touchY < rect.bottom) {
                        // Find where to insert the element for ordering
                        const children = Array.from(zone.children);
                        let nextElement = children.find(child => touchX < child.getBoundingClientRect().left + child.getBoundingClientRect().width / 2);
                        zone.insertBefore(draggedItem, nextElement || null);
                        droppedInZone = true;
                     }
                });
                
                draggedItem.style.position = '';
                draggedItem.style.left = '';
                draggedItem.style.top = '';
                draggedItem.style.zIndex = '';
                draggedItem.classList.remove('dragging-touch');
                draggedItem = null;
            });
        }

        backToMenuBtn.addEventListener('click', showMenu);
        createMenu();

    </script>
</body>
</html>
