<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌟 Ciencias con Isabella 🌟</title>
    <!-- Tailwind CSS para estilos rápidos y modernos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            min-height: 100vh;
            /* Previene el scroll horizontal no deseado en móviles */
            overflow-x: hidden; 
        }

        /* Optimizaciones Touch para iPad/Tablets */
        .touch-manipulation {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Previene que se seleccione texto o se abra lupa al mantener presionado en iPad */
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: none;
        }

        .scroll-touch {
            -webkit-overflow-scrolling: touch;
        }

        .bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.1); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        .btn-game {
            transition: all 0.2s ease;
        }
        .btn-game:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .modal-overlay {
            backdrop-filter: blur(5px);
        }

        /* Estilos para el confeti */
        canvas#confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body class="relative">

    <canvas id="confetti"></canvas>

    <!-- Barra Superior Responsiva -->
    <nav class="fixed top-0 w-full p-4 flex justify-between items-start z-50 pointer-events-none">
        <!-- Botones Izquierda -->
        <div class="flex flex-col gap-2 md:flex-row pointer-events-auto">
            <!-- Botón de cambio de idioma -->
            <button id="langBtn" onclick="toggleLang()" class="touch-manipulation bg-white border-4 border-indigo-400 hover:bg-indigo-50 rounded-full px-4 py-2 md:px-6 md:py-3 shadow-xl font-bold text-indigo-700 transition-all bounce-in flex items-center justify-center gap-2 text-sm md:text-base">
                🇪🇸 Español

        </div>

        </div>
    </nav>

    <!-- Contenedor Principal -->

        </header>

    <!-- Modal del Juego -->

            </div>

            <div id="modalContent" class="p-6 md:p-8 text-center bg-indigo-50 overflow-y-auto scroll-touch">
                <!-- Contenido dinámico del juego -->
            </div>

                <!-- Mensajes de Correcto/Incorrecto -->
            </div>
        </div>
    </div>

    <!-- Modal de Vocabulario -->

                            <h3 class="text-xl md:text-2xl font-black text-emerald-600 mb-2">🐸 Amphibians</h3>
                            <ul class="list-disc pl-6 space-y-1">
                                <li>When young, breathe through <strong>gills</strong>; when adults, through <strong>lungs</strong> and <strong>skin</strong>.</li>
                                <li>Their skin is <strong>smooth, moist, and thin</strong>.</li>
                                <li class="mt-2 text-indigo-700"><strong>🌟 Examples:</strong> Darwin's frog, Chilean toad, salamander.</li>
                            </ul>
                        </div>
                    </div>
                `
            };
            content.innerHTML = vocabData[currentLang];
            modal.classList.remove('hidden');
        }

        function cerrarVocabulario() {
            document.getElementById('vocabModal').classList.add('hidden');
        }

        function renderGrid() {
            gridNiveles.innerHTML = '';
            niveles.forEach((nivel, index) => {
                const isCompleted = completados.includes(nivel.id);
                const btn = document.createElement('button');
                btn.className = `touch-manipulation btn-game h-28 md:h-40 rounded-3xl font-bold text-lg md:text-2xl flex flex-col items-center justify-center p-2 border-4 
                    ${isCompleted ? 'bg-green-100 border-green-400 text-green-700' : 'bg-white border-indigo-200 text-indigo-600 hover:bg-indigo-50'} shadow-lg`;
                
                btn.innerHTML = `
                    <span class="text-4xl md:text-5xl mb-1 md:mb-2">${nivel.emoji}</span>
                    <span class="text-center">${i18n[currentLang].gameWord} ${index + 1}</span>
                    ${isCompleted ? '<span class="absolute top-2 right-2 text-xl md:text-2xl">✅</span>' : ''}
                `;
                btn.onclick = () => abrirJuego(nivel);
                btn.style.animationDelay = `${index * 0.05}s`;
                btn.classList.add('bounce-in');
                gridNiveles.appendChild(btn);
            });
        }

        function actualizarPuntaje(cambio) {
            puntaje += cambio;
            if (puntaje < 0) puntaje = 0; 
            scoreDisplay.innerText = puntaje;
            
            const scoreCont = scoreDisplay.parentElement.parentElement;
            scoreCont.classList.remove('bounce-in');
            void scoreCont.offsetWidth; 
            scoreCont.classList.add('bounce-in');

            if(cambio > 0) {
                scoreCont.classList.add('bg-green-100');
                setTimeout(() => scoreCont.classList.remove('bg-green-100'), 500);
            } else {
                scoreCont.classList.add('bg-red-100');
                setTimeout(() => scoreCont.classList.remove('bg-red-100'), 500);
            }
        }

        function mostrarFeedback(esCorrecto, mensajeError = null) {
            feedbackBox.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            
            if (esCorrecto) {
                feedbackBox.classList.add('bg-green-100', 'text-green-700');
                feedbackBox.innerHTML = i18n[currentLang].correctMsg;
                actualizarPuntaje(10);
                lanzarConfeti();
                
                if (!completados.includes(nivelActual.id)) {
                    completados.push(nivelActual.id);
                }

                setTimeout(() => {
                    cerrarJuego();
                    renderGrid();
                }, 2500);
            } else {
                feedbackBox.classList.add('bg-red-100', 'text-red-700');
                feedbackBox.innerHTML = mensajeError ? `${mensajeError}. ${i18n[currentLang].losePoints}` : i18n[currentLang].losePoints;
                actualizarPuntaje(-5);
                
                const modalDiv = modalContent.parentElement;
                modalDiv.classList.add('shake');
                setTimeout(() => modalDiv.classList.remove('shake'), 400);
            }
        }

        function pronunciarPalabra(palabra) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(palabra);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.8; 
                utterance.pitch = 1.2; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert(i18n[currentLang].noAudio);
            }
        }

        // --- NUEVO SISTEMA: MANTENER PRESIONADO PARA HABLAR (PUSH-TO-TALK) ---
        function startHoldToSpeak(event, palabraObjetivo) {
            // Prevenir scroll, click secundario o selección al mantener presionado en touch
            if(event.type === 'touchstart') event.preventDefault(); 
            
            if (isRecording) return; // Si ya está escuchando, no hacer nada

            const btnHablar = document.getElementById('btnHablar');
            if (!btnHablar) return;

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                mostrarFallbackMic();
                return;
            }

            isRecording = true;
            feedbackBox.classList.add('hidden'); // Ocultar mensajes de error anteriores
            
            // Efecto visual de apretado
            btnHablar.innerHTML = i18n[currentLang].listening;
            btnHablar.classList.replace('bg-blue-500', 'bg-red-500');
            btnHablar.classList.replace('hover:bg-blue-600', 'hover:bg-red-600');
            btnHablar.classList.add('scale-95', 'animate-pulse');

            // Iniciar reconocimiento
            holdRecognition = new SpeechRecognition();
            holdRecognition.lang = 'en-US';
            holdRecognition.interimResults = false;
            holdRecognition.maxAlternatives = 1;

            holdRecognition.onresult = (e) => {
                const resultado = e.results[0][0].transcript.toLowerCase().trim();
                const objetivo = palabraObjetivo.toLowerCase().trim();
                
                const resLimpio = resultado.replace(/[^\w\s]|_/g, "");
                const objLimpio = objetivo.replace(/[^\w\s]|_/g, "");

                if (resLimpio.includes(objLimpio) || objLimpio.includes(resLimpio)) {
                    mostrarFeedback(true);
                } else {
                    mostrarFeedback(false, i18n[currentLang].heardButExpected(resultado, palabraObjetivo));
                }
            };

            holdRecognition.onerror = (e) => {
                if(e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                    mostrarFallbackMic();
                } else if (e.error !== 'aborted') {
                    mostrarFeedback(false, i18n[currentLang].didNotHear);
                }
            };

            holdRecognition.onend = () => {
                resetearBotonMic();
            };

            try {
                holdRecognition.start();
            } catch (e) {
                resetearBotonMic();
                mostrarFallbackMic();
            }
        }

        function stopHoldToSpeak(event) {
            if (event && event.type === 'touchend') event.preventDefault();

            if (!isRecording) return;
            
            // Al soltar el dedo, forzamos detener la escucha, lo que procesa el resultado inmediatamente
            if (holdRecognition) {
                try { holdRecognition.stop(); } catch(e) {}
            }
            
            // Reinicio visual instantáneo para mayor fluidez
            resetearBotonMic();
        }

        function resetearBotonMic() {
            isRecording = false;
            const btnHablar = document.getElementById('btnHablar');
            if (btnHablar) {
                btnHablar.innerHTML = i18n[currentLang].speakBtn;
                btnHablar.classList.replace('bg-red-500', 'bg-blue-500');
                btnHablar.classList.replace('hover:bg-red-600', 'hover:bg-blue-600');
                btnHablar.classList.remove('scale-95', 'animate-pulse');
            }
            holdRecognition = null;
        }

        function mostrarFallbackMic() {
            const container = document.getElementById('speakGameContainer');
            if (container && !document.getElementById('fallbackContainer')) {
                const innerCont = document.createElement('div');
                innerCont.id = 'fallbackContainer';
                innerCont.className = "bg-orange-100 border-4 border-orange-300 p-4 md:p-6 rounded-3xl mt-6 bounce-in";
                innerCont.innerHTML = `
                    <p class="text-orange-800 font-bold mb-4 text-base md:text-xl">${i18n[currentLang].micFallbackText}</p>
                    <div class="flex flex-col sm:flex-row gap-3 justify-center">
                        <button onclick="mostrarFeedback(true)" class="touch-manipulation bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-full shadow-lg text-lg md:text-xl w-full sm:w-auto">
                            ${i18n[currentLang].micFallbackYes}
                        </button>
                        <button onclick="mostrarFeedback(false, '')" class="touch-manipulation bg-red-400 hover:bg-red-500 text-white font-bold py-3 px-6 rounded-full shadow-lg text-lg md:text-xl w-full sm:w-auto">
                            ${i18n[currentLang].micFallbackNo}
                        </button>
                    </div>
                `;
                const btnHablar = document.getElementById('btnHablar');
                if(btnHablar) btnHablar.style.display = 'none'; 
                container.appendChild(innerCont);
            }
        }

        function abrirJuego(nivel) {
            nivelActual = nivel;
            modalTitle.innerText = `${i18n[currentLang].gameWord} ${niveles.findIndex(n => n.id === nivel.id) + 1} ${nivel.emoji}`;
            feedbackBox.classList.add('hidden');
            
            let instruccion = nivel.instruct ? nivel.instruct[currentLang] : '';
            let html = instruccion ? `<p class="text-lg md:text-2xl text-indigo-800 font-bold mb-6">${instruccion}</p>` : '';

            if (nivel.type === 'listen_write') {
                html += `
                    <button onclick="pronunciarPalabra('${nivel.word}')" 
                            class="touch-manipulation bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-8 rounded-full shadow-lg text-xl md:text-2xl w-full md:w-auto mb-6 transform transition hover:scale-105">
                        ${i18n[currentLang].listenBtn}
                    </button>
                    <div class="mt-2 w-full max-w-md mx-auto">
                        <input type="text" id="inputRespuesta" placeholder="${i18n[currentLang].placeholder}" 
                            class="w-full text-center border-4 border-pink-200 rounded-2xl py-4 px-4 text-xl md:text-2xl focus:outline-none focus:border-pink-500 mb-4" autocomplete="off">
                        <button onclick="verificarEscritura('${nivel.word}')" 
                                class="touch-manipulation bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-10 rounded-full shadow-lg text-xl w-full">
                            ${i18n[currentLang].checkBtn}
                        </button>
                    </div>
                `;
            } else if (nivel.type === 'speak') {
                // Nuevo botón diseñado específicamente para eventos táctiles (Push-to-Talk)
                html += `
                    <div id="speakGameContainer" class="w-full max-w-md mx-auto">
                        <div class="text-4xl md:text-6xl font-black text-indigo-600 mb-8 bg-white py-6 rounded-3xl border-4 border-indigo-100 shadow-inner break-words">
                            ${nivel.word}
                        </div>
                        <button id="btnHablar" 
                                onmousedown="startHoldToSpeak(event, '${nivel.word}')"
                                onmouseup="stopHoldToSpeak(event)"
                                onmouseleave="stopHoldToSpeak(event)"
                                ontouchstart="startHoldToSpeak(event, '${nivel.word}')"
                                ontouchend="stopHoldToSpeak(event)"
                                ontouchcancel="stopHoldToSpeak(event)"
                                class="no-select bg-blue-500 text-white font-bold py-4 px-8 rounded-full shadow-lg text-xl md:text-2xl w-full transform transition duration-150 ease-in-out cursor-pointer">
                            ${i18n[currentLang].speakBtn}
                        </button>
                        <button onclick="pronunciarPalabra('${nivel.word}')" class="touch-manipulation mt-6 text-indigo-500 font-bold underline text-base md:text-lg block w-full">
                            ${i18n[currentLang].speakHelp}
                        </button>
                    </div>
                `;
            } else if (nivel.type === 'quiz') {
                html += `<div class="text-lg md:text-2xl font-bold text-gray-800 mb-6 bg-white p-4 md:p-6 rounded-2xl shadow">${nivel.question[currentLang]}</div>`;
                html += `<div class="flex flex-col gap-3 w-full max-w-md mx-auto">`;
                
                let opciones = [...nivel.options[currentLang]].sort(() => Math.random() - 0.5);
                
                opciones.forEach(opcion => {
                    html += `
                        <button onclick="verificarQuiz('${opcion}', '${nivel.answer[currentLang]}')" 
                                class="touch-manipulation bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-4 px-6 rounded-2xl shadow-md text-lg md:text-xl w-full transform transition hover:-translate-y-1">
                            ${opcion}
                        </button>
                    `;
                });
                html += `</div>`;
            }

            modalContent.innerHTML = html;
            gameModal.classList.remove('hidden');
        }

        function cerrarJuego() {
            gameModal.classList.add('hidden');
            nivelActual = null;
            
            if (holdRecognition) {
                try { holdRecognition.abort(); } catch(e) {}
                resetearBotonMic();
            }
        }

        function verificarEscritura(palabraCorrecta) {
            const input = document.getElementById('inputRespuesta').value.toLowerCase().trim();
            const correcta = palabraCorrecta.toLowerCase().trim();
            if (input === correcta) {
                mostrarFeedback(true);
            } else {
                mostrarFeedback(false, i18n[currentLang].incorrectSpelling);
            }
        }

        function verificarQuiz(seleccion, correcta) {
            if (seleccion === correcta) {
                mostrarFeedback(true);
            } else {
                mostrarFeedback(false, i18n[currentLang].incorrectQuiz);
            }
        }

        // --- CONFETI (Efecto visual) ---
        let W = window.innerWidth;
        let H = window.innerHeight;
        const canvas = document.getElementById("confetti");
        const context = canvas.getContext("2d");
        const maxConfettis = 100;
        const particles = [];
        const possibleColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#33FFF3", "#FFD700"];

        function randomFromTo(from, to) {
            return Math.floor(Math.random() * (to - from + 1) + from);
        }

        function confettiParticle() {
            this.x = Math.random() * W; 
            this.y = Math.random() * H - H; 
            this.r = randomFromTo(11, 33); 
            this.d = Math.random() * maxConfettis + 11;
            this.color = possibleColors[Math.floor(Math.random() * possibleColors.length)];
            this.tilt = Math.floor(Math.random() * 33) - 11;
            this.tiltAngleIncremental = (Math.random() * 0.07) + 0.05;
            this.tiltAngle = 0;

            this.draw = function() {
                context.beginPath();
                context.lineWidth = this.r / 2;
                context.strokeStyle = this.color;
                context.moveTo(this.x + this.tilt + this.r / 3, this.y);
                context.lineTo(this.x + this.tilt, this.y + this.tilt + this.r / 5);
                return context.stroke();
            };
        }

        let animationId;
        function Draw() {
            const results = [];
            requestAnimationFrame(Draw);
            context.clearRect(0, 0, W, window.innerHeight);

            for (var i = 0; i < maxConfettis; i++) {
                results.push(particles[i].draw());
            }

            let particle = {};
            let remainingFlakes = 0;
            for (var i = 0; i < maxConfettis; i++) {
                particle = particles[i];
                particle.tiltAngle += particle.tiltAngleIncremental;
                particle.y += (Math.cos(particle.d) + 3 + particle.r / 2) / 2;
                particle.tilt = Math.sin(particle.tiltAngle - i / 3) * 15;

                if (particle.y <= H) remainingFlakes++;

                if (particle.x > W + 30 || particle.x < -30 || particle.y > H) {
                    particle.x = Math.random() * W;
                    particle.y = -30;
                    particle.tilt = Math.floor(Math.random() * 10) - 20;
                }
            }
            return results;
        }

        function lanzarConfeti() {
            particles.length = 0;
            for (var i = 0; i < maxConfettis; i++) {
                particles.push(new confettiParticle());
            }
            context.clearRect(0, 0, W, H);
            if(!animationId) {
                animationId = requestAnimationFrame(Draw);
            }
            
            setTimeout(() => {
                particles.length = 0;
            }, 2500);
        }

        window.addEventListener("resize", function() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }, false);
        canvas.width = W;
        canvas.height = H;

        // INICIAR APLICACIÓN
        actualizarTextosUI();
        renderGrid();

    </script>
</body>
</html>
