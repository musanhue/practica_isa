<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 Ciencias con Isabella 🌟</title>
    <!-- Tailwind CSS para estilos rápidos y modernos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            min-height: 100vh;
        }

        .bounce-in {
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.1); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
        }

        .btn-game {
            transition: all 0.2s ease;
        }
        .btn-game:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .modal-overlay {
            backdrop-filter: blur(5px);
        }

        /* Estilos para el confeti */
        canvas#confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body class="p-4 md:p-8 relative">

    <canvas id="confetti"></canvas>

    <!-- Botones Superiores -->
    <div class="fixed top-4 left-4 z-50 flex flex-col gap-2 md:flex-row">
        <!-- Botón de cambio de idioma -->
        <button id="langBtn" onclick="toggleLang()" class="bg-white border-4 border-indigo-400 hover:bg-indigo-50 rounded-full px-4 py-2 md:px-6 md:py-3 shadow-xl font-bold text-indigo-700 transition-all bounce-in flex items-center gap-2">
            🇪🇸 Español
        </button>
        
        <!-- Botón de Vocabulario -->
        <button id="vocabBtn" onclick="abrirVocabulario()" class="bg-white border-4 border-pink-400 hover:bg-pink-50 rounded-full px-4 py-2 md:px-6 md:py-3 shadow-xl font-bold text-pink-700 transition-all bounce-in flex items-center gap-2">
            📚 Vocabulary
        </button>
    </div>

    <!-- Puntuación fija arriba a la derecha -->
    <div class="fixed top-4 right-4 bg-white border-4 border-yellow-400 rounded-full px-4 py-2 md:px-6 md:py-3 shadow-xl z-50 flex items-center gap-2 bounce-in">
        <span class="text-3xl">⭐</span>
        <div class="text-xl md:text-2xl font-black text-indigo-700">
            <span id="scoreLabel">Puntos:</span> <span id="scoreDisplay">0</span>
        </div>
    </div>

    <!-- Encabezado -->
    <header class="text-center mb-10 mt-16 md:mt-8">
        <h1 id="mainTitle" class="text-5xl md:text-6xl font-black text-white drop-shadow-md mb-4">
            ¡Hola Isabella! 👧🏻✨
        </h1>
        <p id="subTitle" class="text-lg md:text-2xl text-indigo-800 font-bold bg-white/50 inline-block px-6 py-2 rounded-full shadow-sm">
            ¡Practiquemos el vocabulario de la Unidad 2 de Natural Science! 🦁🦅🐸
        </p>
    </header>

    <!-- Contenedor de Niveles -->
    <main class="max-w-6xl mx-auto">
        <div id="gridNiveles" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-6">
            <!-- Los botones se generan con JS -->
        </div>
    </main>

    <!-- Modal del Juego -->
    <div id="gameModal" class="hidden fixed inset-0 bg-black/60 modal-overlay z-40 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl overflow-hidden shadow-2xl transform transition-all">
            
            <div class="bg-indigo-500 p-4 flex justify-between items-center text-white">
                <h2 id="modalTitle" class="text-2xl font-bold">Nivel</h2>
                <button onclick="cerrarJuego()" class="text-white hover:text-pink-200 text-3xl font-bold leading-none">&times;</button>
            </div>

            <div id="modalContent" class="p-8 text-center bg-indigo-50">
                <!-- Contenido dinámico del juego -->
            </div>

            <div id="feedbackBox" class="hidden p-4 text-center font-bold text-xl">
                <!-- Mensajes de Correcto/Incorrecto -->
            </div>
        </div>
    </div>

    <!-- Modal de Vocabulario -->
    <div id="vocabModal" class="hidden fixed inset-0 bg-black/60 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden shadow-2xl transform transition-all">
            <div class="bg-pink-500 p-4 flex justify-between items-center text-white shrink-0">
                <h2 id="vocabTitle" class="text-2xl font-bold">📚 Vocabulary Summary / Resumen</h2>
                <button onclick="cerrarVocabulario()" class="text-white hover:text-pink-200 text-3xl font-bold leading-none">&times;</button>
            </div>
            <div id="vocabContent" class="p-6 md:p-8 overflow-y-auto bg-pink-50 space-y-6">
                <!-- Contenido dinámico del vocabulario -->
            </div>
        </div>
    </div>

    <!-- Script de lógica -->
    <script>

        const i18n = {

        // --- BASE DE DATOS DE LOS 15 JUEGOS ---
        const niveles = [

            { id: 3, type: 'quiz', emoji: '🫧',

              answer: { es: 'Branquias', en: 'Gills' } },
            { id: 4, type: 'listen_write', word: 'Amphibians', emoji: '🐸', 
              instruct: { es: '¡Escucha atentamente y escribe!', en: 'Listen carefully and type!' } },
            { id: 5, type: 'speak', word: 'Reptiles', emoji: '🦎', 
              instruct: { es: '¡Leámoslo en voz alta!', en: 'Let\'s read it out loud!' } },
            { id: 6, type: 'quiz', emoji: '🦒',
              question: { es: 'Los animales con columna vertebral y esqueleto interno son... 🦴', en: 'Animals with a spinal column and internal skeleton are... 🦴' }, 
              options: { es: ['Invertebrados', 'Vertebrados', 'Mamíferos'], en: ['Invertebrates', 'Vertebrates', 'Mammals'] }, 
              answer: { es: 'Vertebrados', en: 'Vertebrates' } },
            { id: 7, type: 'listen_write', word: 'Skeleton', emoji: '💀', 
              instruct: { es: '¿Cómo se escribe esqueleto en inglés?', en: 'How do you spell "esqueleto" in English?' } },
            { id: 8, type: 'speak', word: 'Lungs', emoji: '🫁', 
              instruct: { es: '¡Pronuncia los órganos que usamos para respirar!', en: 'Pronounce the organs we use to breathe!' } },
            { id: 9, type: 'quiz', emoji: '🪶',
              question: { es: '¿Qué cubre el cuerpo de un ave? 🦜', en: 'What covers a bird\'s body? 🦜' }, 
              options: { es: ['Pelo', 'Escamas', 'Plumas'], en: ['Hair', 'Scales', 'Feathers'] }, 
              answer: { es: 'Plumas', en: 'Feathers' } },
            { id: 10, type: 'listen_write', word: 'Scales', emoji: '🐠', 
              instruct: { es: 'Escucha la palabra (Escamas)', en: 'Listen to the word (Escamas)' } },
            { id: 11, type: 'speak', word: 'Fins', emoji: '🦈', 
              instruct: { es: '¡Habla al micrófono! (Aletas)', en: 'Speak into the mic! (Aletas)' } },
            { id: 12, type: 'quiz', emoji: '🐣',
              question: { es: 'Los animales que ponen huevos son... 🥚', en: 'Animals that lay eggs are... 🥚' }, 
              options: { es: ['Ovíparos', 'Vivíparos', 'Mamíferos'], en: ['Oviparous', 'Viviparous', 'Mammals'] }, 
              answer: { es: 'Ovíparos', en: 'Oviparous' } },
            { id: 13, type: 'listen_write', word: 'Viviparous', emoji: '🐶', 
              instruct: { es: 'Escribe: Animales que nacen del vientre.', en: 'Type: Animals born from the womb.' } },
            { id: 14, type: 'speak', word: 'Wings', emoji: '🦋', 
              instruct: { es: '¡Dilo fuerte y claro! (Alas)', en: 'Say it loud and clear! (Alas)' } },
            { id: 15, type: 'quiz', emoji: '🐸',
              question: { es: 'Los anfibios tienen piel que es... 💧', en: 'Amphibians have skin that is... 💧' }, 
              options: { es: ['Gruesa y seca', 'Suave y húmeda', 'Cubierta de pelo'], en: ['Thick and dry', 'Smooth and moist', 'Covered in hair'] },

        let puntaje = 0;
        let nivelActual = null;
        let completados = [];

        // DOM Elements
        const scoreDisplay = document.getElementById('scoreDisplay');
        const gridNiveles = document.getElementById('gridNiveles');
        const gameModal = document.getElementById('gameModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const feedbackBox = document.getElementById('feedbackBox');

        // Función para cambiar de idioma
        function toggleLang() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            actualizarTextosUI();
            
            // Re-renderizar
            renderGrid();
            if (nivelActual) {
                abrirJuego(nivelActual);
            }
            if (!document.getElementById('vocabModal').classList.contains('hidden')) {
                abrirVocabulario();
            }
        }

        function actualizarTextosUI() {
            document.title = i18n[currentLang].title;
            document.getElementById('mainTitle').innerText = i18n[currentLang].greeting;
            document.getElementById('subTitle').innerText = i18n[currentLang].subtitle;
            document.getElementById('scoreLabel').innerText = i18n[currentLang].scoreText;
            document.getElementById('langBtn').innerText = i18n[currentLang].langBtn;
            document.getElementById('vocabBtn').innerText = i18n[currentLang].vocabBtn;
            document.getElementById('vocabTitle').innerText = i18n[currentLang].vocabTitle;
        }

        // --- LÓGICA DE VOCABULARIO ---
        function abrirVocabulario() {
            const modal = document.getElementById('vocabModal');
            const content = document.getElementById('vocabContent');
            
            const vocabData = {
                es: `
                    <div class="space-y-6 text-gray-800 text-lg">

                                <li class="mt-2 text-indigo-700"><strong>🌟 Ejemplos:</strong> Cóndor, flamenco, pelícano, pato, pingüino (no vuela), avestruz (no vuela).</li>
                            </ul>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-green-500">
                            <h3 class="text-2xl font-black text-green-600 mb-2">🦎 Reptiles (Reptiles)</h3>
                            <ul class="list-disc pl-6 space-y-1">
                                <li>Piel seca con <strong>scales</strong> (escamas). Respiran por <strong>lungs</strong> y son <strong>oviparous</strong>.</li>
                                <li>Se mueven <strong>slithering</strong> (reptando), caminando o nadando.</li>
                                <li class="mt-2 text-indigo-700"><strong>🌟 Ejemplos:</strong> Cocodrilo, tortuga, serpiente (culebra de cola corta), lagartija (lagarto joya), camaleón.</li>

                        </div>

                            <ul class="list-disc pl-6 space-y-1">
                                <li>Cuerpo con <strong>scales</strong> (escamas). Respiran por <strong>gills</strong> (branquias).</li>
                                <li>Se mueven usando <strong>fins</strong> (aletas). Son <strong>oviparous</strong>.</li>
                                <li class="mt-2 text-indigo-700"><strong>🌟 Ejemplos:</strong> Congrio, caballito de mar, raya, tiburón, anchoa.</li>
                            </ul>

                    </div>

                                <li>They are <strong>viviparous</strong> (womb). Drink <strong>milk</strong> from <strong>mammary glands</strong>.</li>
                                <li>Most have 4 <strong>legs</strong>. Whales have <strong>fins</strong> and bats have <strong>wings</strong>.</li>
                                <li class="mt-2 text-indigo-700"><strong>🌟 Examples:</strong> Puma, guanaco, Andean fox, horse, whale, dolphin, bat, dog, cat.</li>
                            </ul>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-blue-400">
                            <h3 class="text-2xl font-black text-blue-600 mb-2">🦅 Birds</h3>
                            <ul class="list-disc pl-6 space-y-1">
                                <li>Skin covered with <strong>feathers</strong>. Breathe through <strong>lungs</strong>. <strong>Oviparous</strong>.</li>
                                <li>Have two <strong>wings</strong>, two <strong>legs</strong>, and a <strong>beak</strong>.</li>
                                <li class="mt-2 text-indigo-700"><strong>🌟 Examples:</strong> Condor, flamingo, pelican, duck, penguin (cannot fly), ostrich (cannot fly).</li>
                            </ul>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-green-500">
                            <h3 class="text-2xl font-black text-green-600 mb-2">🦎 Reptiles</h3>
                            <ul class="list-disc pl-6 space-y-1">
                                <li>Dry skin with <strong>scales</strong>. Breathe through <strong>lungs</strong>. <strong>Oviparous</strong>.</li>
                                <li>Move by <strong>slithering</strong>, crawling, walking, or swimming.</li>
                                <li class="mt-2 text-indigo-700"><strong>🌟 Examples:</strong> Crocodile, turtle, snake (Chilean slender snake), lizard (Jewel lizard), chameleon.</li>
                            </ul>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-cyan-400">
                            <h3 class="text-2xl font-black text-cyan-600 mb-2">🐟 Fish</h3>
                            <ul class="list-disc pl-6 space-y-1">
                                <li>Body with <strong>scales</strong>. Breathe underwater through <strong>gills</strong>.</li>
                                <li>Move using their <strong>fins</strong>. They are <strong>oviparous</strong>.</li>
                                <li class="mt-2 text-indigo-700"><strong>🌟 Examples:</strong> Conger eel, seahorse, stingray, shark, anchovy.</li>
                            </ul>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-emerald-400">
                            <h3 class="text-2xl font-black text-emerald-600 mb-2">🐸 Amphibians</h3>
                            <ul class="list-disc pl-6 space-y-1">
                                <li>When young, breathe through <strong>gills</strong>; when adults, through <strong>lungs</strong> and <strong>skin</strong>.</li>
                                <li>Their skin is <strong>smooth, moist, and thin</strong>.</li>
                                <li class="mt-2 text-indigo-700"><strong>🌟 Examples:</strong> Darwin's frog, Chilean toad, salamander.</li>
                            </ul>
                        </div>
                    </div>
                `
            };

            content.innerHTML = vocabData[currentLang];
            modal.classList.remove('hidden');
        }

        function cerrarVocabulario() {
            document.getElementById('vocabModal').classList.add('hidden');
        }

        // Inicializar Grid
        function renderGrid() {
            gridNiveles.innerHTML = '';
            niveles.forEach((nivel, index) => {
                const isCompleted = completados.includes(nivel.id);
                const btn = document.createElement('button');
                btn.className = `btn-game h-32 md:h-40 rounded-3xl font-bold text-xl md:text-2xl flex flex-col items-center justify-center p-2 border-4 
                    ${isCompleted ? 'bg-green-100 border-green-400 text-green-700' : 'bg-white border-indigo-200 text-indigo-600 hover:bg-indigo-50'} shadow-lg`;
                
                btn.innerHTML = `
                    <span class="text-4xl md:text-5xl mb-2">${nivel.emoji}</span>
                    <span class="text-center text-lg md:text-2xl">${i18n[currentLang].gameWord} ${index + 1}</span>
                    ${isCompleted ? '<span class="absolute top-2 right-2 text-2xl">✅</span>' : ''}
                `;
                btn.onclick = () => abrirJuego(nivel);
                
                // Efecto de entrada en cascada
                btn.style.animationDelay = `${index * 0.05}s`;
                btn.classList.add('bounce-in');

                gridNiveles.appendChild(btn);
            });
        }

        // Lógica de puntuación
        function actualizarPuntaje(cambio) {
            puntaje += cambio;
            if (puntaje < 0) puntaje = 0; // No dejar en negativo para no desmotivar
            scoreDisplay.innerText = puntaje;
            
            // Animación de la puntuación
            const scoreCont = scoreDisplay.parentElement.parentElement;
            scoreCont.classList.remove('bounce-in');
            void scoreCont.offsetWidth; // trigger reflow
            scoreCont.classList.add('bounce-in');

            if(cambio > 0) {
                scoreCont.classList.add('bg-green-100');
                setTimeout(() => scoreCont.classList.remove('bg-green-100'), 500);
            } else {
                scoreCont.classList.add('bg-red-100');
                setTimeout(() => scoreCont.classList.remove('bg-red-100'), 500);
            }
        }

        function mostrarFeedback(esCorrecto, mensajeError = null) {
            feedbackBox.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            
            if (esCorrecto) {
                feedbackBox.classList.add('bg-green-100', 'text-green-700');
                feedbackBox.innerHTML = i18n[currentLang].correctMsg;
                actualizarPuntaje(10);
                lanzarConfeti();
                
                if (!completados.includes(nivelActual.id)) {
                    completados.push(nivelActual.id);
                }

                setTimeout(() => {
                    cerrarJuego();
                    renderGrid();
                }, 2500);

            } else {
                feedbackBox.classList.add('bg-red-100', 'text-red-700');
                feedbackBox.innerHTML = mensajeError ? `${mensajeError}. ${i18n[currentLang].losePoints}` : i18n[currentLang].losePoints;
                actualizarPuntaje(-5);
                
                const modalDiv = modalContent.parentElement;
                modalDiv.classList.add('shake');
                setTimeout(() => modalDiv.classList.remove('shake'), 400);
            }
        }

        // --- SISTEMA DE AUDIO (Texto a Voz) ---
        function pronunciarPalabra(palabra) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(palabra);
                utterance.lang = 'en-US'; // Vocabulario siempre en inglés
                utterance.rate = 0.8; 
                utterance.pitch = 1.2; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert(i18n[currentLang].noAudio);
            }
        }

        // --- SISTEMA DE RECONOCIMIENTO DE VOZ (Voz a Texto) ---
        function iniciarReconocimiento(palabraObjetivo) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert(i18n[currentLang].noMic);
                return;
            }

            const btnHablar = document.getElementById('btnHablar');
            btnHablar.innerHTML = i18n[currentLang].listening;
            btnHablar.classList.replace('bg-blue-500', 'bg-red-500');
            btnHablar.classList.add('animate-pulse');

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.start();

            recognition.onresult = (event) => {
                const resultado = event.results[0][0].transcript.toLowerCase().trim();
                const objetivo = palabraObjetivo.toLowerCase().trim();
                
                // Quitamos puntuación para comparar
                const resLimpio = resultado.replace(/[^\w\s]|_/g, "");
                const objLimpio = objetivo.replace(/[^\w\s]|_/g, "");

                if (resLimpio.includes(objLimpio) || objLimpio.includes(resLimpio)) {
                    mostrarFeedback(true);
                } else {
                    mostrarFeedback(false, i18n[currentLang].heardButExpected(resultado, palabraObjetivo));
                }
            };

            recognition.onerror = (event) => {
                mostrarFeedback(false, i18n[currentLang].didNotHear);
            };

            recognition.onend = () => {
                btnHablar.innerHTML = i18n[currentLang].speakBtn;
                btnHablar.classList.replace('bg-red-500', 'bg-blue-500');
                btnHablar.classList.remove('animate-pulse');
            }
        }

        // --- GESTIÓN DEL MODAL Y TIPOS DE JUEGO ---
        function abrirJuego(nivel) {
            nivelActual = nivel;
            modalTitle.innerText = `${i18n[currentLang].gameWord} ${niveles.findIndex(n => n.id === nivel.id) + 1} ${nivel.emoji}`;
            feedbackBox.classList.add('hidden');
            
            let instruccion = nivel.instruct ? nivel.instruct[currentLang] : '';
            let html = instruccion ? `<p class="text-xl md:text-2xl text-indigo-800 font-bold mb-6">${instruccion}</p>` : '';

            // JUEGO: ESCUCHAR Y ESCRIBIR
            if (nivel.type === 'listen_write') {
                html += `
                    <button onclick="pronunciarPalabra('${nivel.word}')" 
                            class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-8 rounded-full shadow-lg text-xl md:text-2xl mb-8 transform transition hover:scale-110">
                        ${i18n[currentLang].listenBtn}
                    </button>
                    <div class="mt-4">
                        <input type="text" id="inputRespuesta" placeholder="${i18n[currentLang].placeholder}" 
                            class="w-full text-center border-4 border-pink-200 rounded-2xl py-3 px-4 text-xl md:text-2xl focus:outline-none focus:border-pink-500" autocomplete="off">
                        <button onclick="verificarEscritura('${nivel.word}')" 
                                class="mt-6 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-10 rounded-full shadow-lg text-xl w-full md:w-auto">
                            ${i18n[currentLang].checkBtn}
                        </button>
                    </div>
                `;
            } 
            // JUEGO: LEER Y HABLAR
            else if (nivel.type === 'speak') {
                html += `
                    <div class="text-4xl md:text-6xl font-black text-indigo-600 my-8 bg-white py-6 rounded-3xl border-4 border-indigo-100 shadow-inner break-words">
                        ${nivel.word}
                    </div>
                    <button id="btnHablar" onclick="iniciarReconocimiento('${nivel.word}')" 
                            class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full shadow-lg text-xl md:text-2xl w-full transform transition hover:scale-105">
                        ${i18n[currentLang].speakBtn}
                    </button>
                    <button onclick="pronunciarPalabra('${nivel.word}')" class="mt-4 text-indigo-500 font-bold underline text-sm md:text-base">
                        ${i18n[currentLang].speakHelp}
                    </button>
                `;
            }
            // JUEGO: PREGUNTAS (QUIZ)
            else if (nivel.type === 'quiz') {
                html += `<div class="text-xl md:text-3xl font-bold text-gray-800 mb-8 bg-white p-4 rounded-xl shadow">${nivel.question[currentLang]}</div>`;
                html += `<div class="flex flex-col gap-4">`;
                
                // Mezclar opciones
                let opciones = [...nivel.options[currentLang]].sort(() => Math.random() - 0.5);
                
                opciones.forEach(opcion => {
                    html += `
                        <button onclick="verificarQuiz('${opcion}', '${nivel.answer[currentLang]}')" 
                                class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-3 md:py-4 px-4 md:px-6 rounded-2xl shadow-md text-lg md:text-xl transform transition hover:-translate-y-1">
                            ${opcion}
                        </button>
                    `;
                });
                html += `</div>`;
            }

            modalContent.innerHTML = html;
            gameModal.classList.remove('hidden');
        }

        function cerrarJuego() {
            gameModal.classList.add('hidden');
            nivelActual = null;
        }

        // --- VERIFICADORES ---
        function verificarEscritura(palabraCorrecta) {
            const input = document.getElementById('inputRespuesta').value.toLowerCase().trim();
            const correcta = palabraCorrecta.toLowerCase().trim();
            if (input === correcta) {
                mostrarFeedback(true);
            } else {
                mostrarFeedback(false, i18n[currentLang].incorrectSpelling);
            }
        }

        function verificarQuiz(seleccion, correcta) {
            if (seleccion === correcta) {
                mostrarFeedback(true);
            } else {
                mostrarFeedback(false, i18n[currentLang].incorrectQuiz);
            }
        }

        // --- CONFETI (Efecto visual) ---
        let W = window.innerWidth;
        let H = window.innerHeight;
        const canvas = document.getElementById("confetti");
        const context = canvas.getContext("2d");
        const maxConfettis = 100;
        const particles = [];

        const possibleColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#33FFF3", "#FFD700"];

        function randomFromTo(from, to) {
            return Math.floor(Math.random() * (to - from + 1) + from);
        }

        function confettiParticle() {
            this.x = Math.random() * W; // x
            this.y = Math.random() * H - H; // y
            this.r = randomFromTo(11, 33); // radius
            this.d = Math.random() * maxConfettis + 11;
            this.color = possibleColors[Math.floor(Math.random() * possibleColors.length)];
            this.tilt = Math.floor(Math.random() * 33) - 11;
            this.tiltAngleIncremental = (Math.random() * 0.07) + 0.05;
            this.tiltAngle = 0;

            this.draw = function() {
                context.beginPath();
                context.lineWidth = this.r / 2;
                context.strokeStyle = this.color;
                context.moveTo(this.x + this.tilt + this.r / 3, this.y);
                context.lineTo(this.x + this.tilt, this.y + this.tilt + this.r / 5);
                return context.stroke();
            };
        }

        let animationId;
        function Draw() {
            const results = [];
            requestAnimationFrame(Draw);
            context.clearRect(0, 0, W, window.innerHeight);

            for (var i = 0; i < maxConfettis; i++) {
                results.push(particles[i].draw());
            }

            let particle = {};
            let remainingFlakes = 0;
            for (var i = 0; i < maxConfettis; i++) {
                particle = particles[i];

                particle.tiltAngle += particle.tiltAngleIncremental;
                particle.y += (Math.cos(particle.d) + 3 + particle.r / 2) / 2;
                particle.tilt = Math.sin(particle.tiltAngle - i / 3) * 15;

                if (particle.y <= H) remainingFlakes++;

                // Si cae al fondo, no reiniciar a menos que sigamos lanzando
                if (particle.x > W + 30 || particle.x < -30 || particle.y > H) {
                    particle.x = Math.random() * W;
                    particle.y = -30;
                    particle.tilt = Math.floor(Math.random() * 10) - 20;
                }
            }
            return results;
        }

        function lanzarConfeti() {
            particles.length = 0;
            for (var i = 0; i < maxConfettis; i++) {
                particles.push(new confettiParticle());
            }
            context.clearRect(0, 0, W, H);
            if(!animationId) {
                animationId = requestAnimationFrame(Draw);
            }
            
            // Detener confeti después de 2.5 segundos
            setTimeout(() => {
                particles.length = 0;
            }, 2500);
        }

        window.addEventListener("resize", function() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }, false);
        canvas.width = W;
        canvas.height = H;

        // INICIAR APLICACIÓN
        actualizarTextosUI();
        renderGrid();

    </script>
</body>
</html>
