<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos Interactivos de Animales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            color: #1e3a8a;
        }
        .game-card {
            background-color: white;
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }
        .option-btn {
            transition: all 0.2s ease-in-out;
        }
        .option-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .correct {
            animation: correct-pulse 0.5s ease;
        }
        .incorrect {
            animation: incorrect-shake 0.5s ease;
        }
        @keyframes correct-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background-color: #22c55e; color: white; }
            100% { transform: scale(1); }
        }
        @keyframes incorrect-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
            50% { background-color: #ef4444; color: white; }
        }
        #feedback-modal {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-2xl mx-auto text-center">
        
        <!-- Header -->
        <header class="mb-6">
            <h1 class="text-5xl font-bold text-sky-600">Animal Games! 🎲</h1>
            <p class="text-lg text-slate-500">¡Juegos de Animales!</p>
            <div id="score-display" class="mt-4 text-3xl font-bold bg-white px-6 py-3 rounded-full shadow-lg inline-block text-blue-800">
                Score: <span id="score">0</span>
                <small class="block text-sm text-slate-400">Puntaje</small>
            </div>
        </header>

        <!-- Start Screen -->
        <div id="start-screen" class="game-card p-8">
            <h2 class="text-3xl font-bold mb-4">Ready to play? 🦒</h2>
            <p class="text-xl text-slate-600 mb-6">¿Lista para jugar?</p>
            <button onclick="startGame()" class="w-full py-4 text-2xl font-bold text-white bg-orange-500 hover:bg-orange-600 rounded-2xl shadow-lg transform hover:scale-105 transition-transform duration-200">
                Start! <span class="text-sm">(Empezar)</span>
            </button>
        </div>

        <!-- Game Area -->
        <div id="game-area" class="game-card p-8 hidden">
            <div id="progress-bar-container" class="w-full bg-gray-200 rounded-full h-4 mb-4">
                <div id="progress-bar" class="bg-blue-500 h-4 rounded-full" style="width: 0%"></div>
            </div>
            <img id="animal-image" src="" alt="Animal" class="w-full max-w-sm mx-auto h-64 object-cover rounded-2xl mb-6 shadow-md">
            <h2 id="question" class="text-2xl md:text-3xl font-bold mb-1"></h2>
            <p id="question-es" class="text-lg text-slate-500 mb-6"></p>
            <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Options will be generated here -->
            </div>
        </div>
        
        <!-- Final Screen -->
        <div id="final-screen" class="game-card p-8 hidden">
            <h2 class="text-4xl font-bold mb-4">Great Job! 🎉</h2>
            <p class="text-2xl text-slate-600 mb-2">¡Excelente Trabajo!</p>
            <p class="text-xl text-slate-500 mb-6">Your final score is: <span id="final-score" class="font-bold text-blue-800"></span></p>
             <p class="text-xl text-slate-500 mb-6"><small>(Tu puntaje final es: <span id="final-score-es" class="font-bold text-blue-800"></span>)</small></p>
            <button onclick="restartGame()" class="w-full py-4 text-2xl font-bold text-white bg-green-500 hover:bg-green-600 rounded-2xl shadow-lg transform hover:scale-105 transition-transform duration-200">
                Play Again? <span class="text-sm">(¿Jugar de nuevo?)</span>
            </button>
        </div>

    </div>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden opacity-0">
        <div id="feedback-content" class="text-6xl font-bold text-white p-8 rounded-full">
            <!-- Feedback content here -->
        </div>
    </div>

        let score = 0;

        const questionEsText = document.getElementById('question-es');
        const optionsContainer = document.getElementById('options');
        const feedbackModal = document.getElementById('feedback-modal');
        const feedbackContent = document.getElementById('feedback-content');
        const progressBar = document.getElementById('progress-bar');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startGame() {
            shuffledGames = shuffleArray([...gameData]);
            startScreen.classList.add('hidden');
            gameArea.classList.remove('hidden');
            loadGame(currentGameIndex);
        }

        function updateProgressBar() {
            const progress = ((currentGameIndex) / shuffledGames.length) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function loadGame(index) {
            updateProgressBar();
            optionsContainer.innerHTML = '';
            const game = shuffledGames[index];
            animalImage.src = game.image;
            animalImage.onerror = () => { animalImage.src = 'https://placehold.co/600x400/fee2e2/ef4444?text=Image+Not+Found'; }
            questionText.textContent = game.question;
            questionEsText.textContent = game.question_es;

            game.options.forEach(option => {
                const button = document.createElement('button');
                button.classList.add('option-btn', 'w-full', 'p-4', 'text-lg', 'font-bold', 'text-white', 'bg-blue-500', 'hover:bg-blue-600', 'rounded-xl', 'shadow-md');
                button.innerHTML = `${option.text} <br> <small class="font-normal">(${option.text_es})</small>`;
                button.onclick = (event) => selectAnswer(option.correct, event.target);
                optionsContainer.appendChild(button);
            });
        }
        
        function showFeedback(correct) {
            feedbackContent.innerHTML = correct ? 'Correct! ✅<br><span class="text-3xl">¡Correcto!</span>' : 'Try Again ❌<br><span class="text-3xl">Intenta de Nuevo</span>';
            feedbackContent.parentElement.classList.toggle('bg-green-500', correct);
            feedbackContent.parentElement.classList.toggle('bg-red-500', !correct);
            feedbackModal.classList.remove('hidden');
            feedbackModal.classList.remove('opacity-0');

            setTimeout(() => {
                feedbackModal.classList.add('opacity-0');
                setTimeout(() => feedbackModal.classList.add('hidden'), 300);
            }, 1000);
        }

             // Disable all buttons to prevent multiple clicks
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);
            
            if (isCorrect) {
                score += 10;
                button.classList.add('correct');
                showFeedback(true);
            } else {
                score -= 5;
                if(score < 0) score = 0; // Don't let score go below 0
                button.classList.add('incorrect');
                showFeedback(false);
            }
            scoreDisplay.textContent = score;

            setTimeout(() => {
                currentGameIndex++;
                if (currentGameIndex < shuffledGames.length) {
                    loadGame(currentGameIndex);
                } else {
                    updateProgressBar(); // to fill the bar at the end
                    showFinalScreen();
                }
            }, 1500); // Wait 1.5 seconds before loading next question
        }
        
        function showFinalScreen() {
            gameArea.classList.add('hidden');
            finalScreen.classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-score-es').textContent = score;
        }

        function restartGame() {
            score = 0;
            currentGameIndex = 0;
            scoreDisplay.textContent = score;
            finalScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }

    </script>
</body>
</html>
